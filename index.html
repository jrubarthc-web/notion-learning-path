      :root {

        --danger-bg: #501313; --danger-text: #f7c1c1;
        --info-bg: #042c53; --info-text: #b5d4f4;
      }

    @media (max-width: 600px) { .page { padding: 1.25rem 1rem 2rem; } }
    .header { padding-bottom: 1.5rem; border-bottom: 0.5px solid var(--border); margin-bottom: 1.5rem; }
    .header-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .nlogo { width: 30px; height: 30px; background: var(--text); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

    .header h1 { font-size: 22px; font-weight: 600; color: var(--text); }
    .header p { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

    .pb-lbl { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-secondary); margin-top: 5px; }

    .mod-num { width: 26px; height: 26px; border-radius: 50%; border: 0.5px solid var(--border-md); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--text-secondary); flex-shrink: 0; transition: all 0.2s; }

    .mod-info { flex: 1; min-width: 0; }
    .mod-title { font-size: 14px; font-weight: 600; color: var(--text); }
    .mod-desc { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
    .lvl { font-size: 11px; padding: 2px 9px; border-radius: 20px; font-weight: 500; flex-shrink: 0; }

    .lessons { display: none; border-top: 0.5px solid var(--border); }
    .lessons.open { display: block; }
    .lesson { border-bottom: 0.5px solid var(--border); }
    .lesson:last-child { border-bottom: none; }
    .lesson-row { display: flex; align-items: center; gap: 10px; padding: 11px 16px; cursor: pointer; user-select: none; transition: background 0.15s; }
    .lesson-row:hover { background: var(--bg-secondary); }

    .lchk.done { background: var(--text); border-color: var(--text); }

    .tip { display: flex; gap: 9px; align-items: flex-start; }
    .tip i { font-size: 14px; color: var(--text); flex-shrink: 0; margin-top: 1px; }
    .tip span { font-size: 13px; color: var(--text-secondary); line-height: 1.55; }
    .links-section { border-top: 0.5px solid var(--border); padding-top: 12px; margin-top: 4px; }
    .links-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-tertiary); margin-bottom: 8px; }
    .links-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .nlink { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text); text-decoration: none; border: 0.5px solid var(--border-md); border-radius: var(--radius-md); padding: 5px 11px; transition: background 0.15s; }
    .nlink:hover { background: var(--bg); }

    .mark-btn { margin-top: 14px; display: inline-flex; align-items: center; gap: 6px; font-size: 12px; padding: 6px 14px; border-radius: var(--radius-md); border: 0.5px solid var(--border-md); background: transparent; color: var(--text-secondary); cursor: pointer; transition: all 0.15s; font-family: inherit; }

    .footer { margin-top: 2rem; padding-top: 1.25rem; border-top: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }

    .rst { font-size: 12px; padding: 5px 13px; border-radius: var(--radius-md); border: 0.5px solid var(--border-md); background: transparent; color: var(--text-secondary); cursor: pointer; font-family: inherit; transition: background 0.15s; }
    .rst:hover { background: var(--bg-secondary); }
  </style>
</head>

const SKEY = "nlp_v6";
let checked = {};
try { checked = JSON.parse(localStorage.getItem(SKEY) || "{}"); } catch(e) {}
function save() { try { localStorage.setItem(SKEY, JSON.stringify(checked)); } catch(e) {} }
function totals() {
  let total = 0, done = 0;
  data.forEach((m, mi) => m.lessons.forEach((_, li) => { total++; if (checked[`${mi}-${li}`]) done++; }));
  return { total, done };
}
function updateProgress() {
  const { total, done } = totals();
  const pct = Math.round((done / total) * 100);
  document.getElementById("pbfill").style.width = pct + "%";
  document.getElementById("pbtxt").textContent = `${done} de ${total} temas completados`;
  document.getElementById("pbpct").textContent = pct + "%";
  document.getElementById("ftrmsg").textContent = pct === 0 ? "Expandí cada subtema para ver el contenido" : pct === 100 ? "¡Completaste todo el learning path! 🎉" : `Vas ${pct}% del camino — ¡seguí así!`;
  data.forEach((m, mi) => {
    const allDone = m.lessons.every((_, li) => checked[`${mi}-${li}`]);
    const el = document.getElementById(`mnum-${mi}`);
    if (!el) return;
    if (allDone) { el.classList.add("done"); el.innerHTML = '<i class="ti ti-check"></i>'; }
    else { el.classList.remove("done"); el.textContent = mi; }
  });
}
function toggleMod(mi) {
  const el = document.getElementById(`ml-${mi}`); const chev = document.getElementById(`mc-${mi}`);
  const open = el.classList.contains("open");
  el.classList.toggle("open", !open); chev.classList.toggle("open", !open);
}
function toggleLesson(mi, li) {
  const det = document.getElementById(`ld-${mi}-${li}`); const chev = document.getElementById(`lc-${mi}-${li}`);
  const open = det.classList.contains("open");
  det.classList.toggle("open", !open); if (chev) chev.classList.toggle("open", !open);
}
function markDone(mi, li, e) {
  if (e) e.stopPropagation();
  const key = `${mi}-${li}`; checked[key] = !checked[key]; save();
  const isDone = checked[key];
  const chk = document.getElementById(`lchk-${mi}-${li}`);
  const txt = document.getElementById(`ltxt-${mi}-${li}`);
  const btn = document.getElementById(`lbtn-${mi}-${li}`);
  if (chk) chk.classList.toggle("done", isDone);
  if (txt) txt.classList.toggle("done", isDone);
  if (btn) { btn.classList.toggle("done-btn", isDone); btn.innerHTML = isDone ? '<i class="ti ti-check"></i> Completado' : '<i class="ti ti-circle-check"></i> Marcar como completado'; }
  updateProgress();
}
function resetAll() {
  if (!confirm("¿Reiniciar todo el progreso?")) return;
  checked = {}; save();
  document.querySelectorAll(".lchk").forEach(el => el.classList.remove("done"));
  document.querySelectorAll(".lesson-name").forEach(el => el.classList.remove("done"));
  document.querySelectorAll(".mark-btn").forEach(btn => { btn.classList.remove("done-btn"); btn.innerHTML = '<i class="ti ti-circle-check"></i> Marcar como completado'; });
  updateProgress();
}
function render() {
  const container = document.getElementById("mods");
  data.forEach((m, mi) => {
    const lessonsHTML = m.lessons.map((l, li) => {
      const isDone = checked[`${mi}-${li}`];
      const tipsHTML = l.tips.map(t => `<div class="tip"><i class="ti ti-point-filled"></i><span>${t}</span></div>`).join("");
      const linksHTML = l.links.map(lk => `<a class="nlink" href="${lk.url}" target="_blank" rel="noopener"><i class="ti ti-external-link"></i>${lk.label}</a>`).join("");
      return `<div class="lesson">
        <div class="lesson-row" onclick="toggleLesson(${mi},${li})">
          <div class="lchk ${isDone?'done':''}" id="lchk-${mi}-${li}" onclick="markDone(${mi},${li},event)"><i class="ti ti-check"></i></div>
          <span class="lesson-name ${isDone?'done':''}" id="ltxt-${mi}-${li}">${l.name}</span>
          <span class="ltag">${l.tag}</span>
          <i class="ti ti-chevron-right lexp" id="lc-${mi}-${li}"></i>
        </div>
        <div class="lesson-detail" id="ld-${mi}-${li}">
          <div class="detail-inner">
            <h4>${l.name}</h4>
            <p class="intro">${l.intro}</p>
            <div class="tips">${tipsHTML}</div>
            <div class="links-section">
              <div class="links-lbl">Documentación oficial de Notion</div>
              <div class="links-grid">${linksHTML}</div>
            </div>
            <button class="mark-btn ${isDone?'done-btn':''}" id="lbtn-${mi}-${li}" onclick="markDone(${mi},${li},event)">
              ${isDone?'<i class="ti ti-check"></i> Completado':'<i class="ti ti-circle-check"></i> Marcar como completado'}
            </button>
          </div>
        </div>
      </div>`;
    }).join("");
    const card = document.createElement("div");
    card.className = "mod";
    card.innerHTML = `
      <div class="mod-hdr" onclick="toggleMod(${mi})">
        <div class="mod-num ${m.lessons.every((_,li)=>checked[`${mi}-${li}`])?'done':''}" id="mnum-${mi}">
          ${m.lessons.every((_,li)=>checked[`${mi}-${li}`])?'<i class="ti ti-check"></i>':mi}
        </div>
        <div class="mod-info"><div class="mod-title">${m.title}</div><div class="mod-desc">${m.desc}</div></div>
        <span class="lvl lv${m.level}">${m.lv}</span>
        <i class="ti ti-chevron-down chev" id="mc-${mi}"></i>
      </div>
      <div class="lessons" id="ml-${mi}">${lessonsHTML}</div>`;
    container.appendChild(card);
  });
  document.getElementById("ml-0").classList.add("open");
  document.getElementById("mc-0").classList.add("open");
  updateProgress();
}
render();
</script>
